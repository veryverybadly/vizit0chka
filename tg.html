<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contacts</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #b0b8c4; 
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 25%, rgba(98, 0, 238, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 85% 75%, rgba(3, 218, 198, 0.2) 0%, transparent 30%);
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            background: rgba(98, 0, 238, 0.08);
            top: -70px;
            right: -70px;
            animation: floatShape 25s infinite linear;
        }

        @keyframes floatShape {
            from { transform: rotate(0deg) translate(0, 0); }
            to { transform: rotate(360deg) translate(20px, -20px); }
        }

        .glass-card {
            width: 240px;
            height: 360px;
            background: rgba(120, 120, 120, 0.25); 
            backdrop-filter: blur(17px);
            -webkit-backdrop-filter: blur(17px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 24px 12px rgba(140, 140, 140, 0.5); 
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
            justify-content: center;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                transparent
            );
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.6),
                transparent,
                rgba(255, 255, 255, 0.2)
            );
        }

        p {
            font-size: 14px;
            color: #1a1a1a;
            line-height: 1.5;
            margin-bottom: 30px;
            z-index: 1;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1;
        }

        a {
            text-decoration: none;
            color: #6200ee; 
            font-weight: 500;
            font-size: 15px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: block;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="bg-shapes"></div>

    <div class="glass-card">
        <p>мне постоянно сносят твинки в тг, поэтому вот вам все мои аккаунты в тг на данный момент</p>
        <div class="links-container">
            <a href="https://t.me/mrsasya_q" target="_blank">t.me/mrsasya_q</a>
            <a href="https://t.me/badlyqb" target="_blank">t.me/badlyqb</a>
        </div>
    </div>

</body>
</html>
