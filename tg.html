<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contacts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #7a8491; 
            font-family: 'Roboto Flex', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(98, 0, 238, 0.2) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(3, 218, 198, 0.25) 0%, transparent 35%);
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 45% 55% 65% 35% / 45% 45% 55% 55%;
            background: rgba(255, 255, 255, 0.05);
            top: -100px;
            right: -100px;
            animation: floatShape 30s infinite linear;
        }

        @keyframes floatShape {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass-card {
            width: 240px;
            height: 360px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(17px);
            -webkit-backdrop-filter: blur(17px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 24px 12px rgba(255, 255, 255, 1.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
            justify-content: center;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.8),
                transparent
            );
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.8),
                transparent,
                rgba(255, 255, 255, 0.3)
            );
        }

        p {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            line-height: 1.4;
            margin-bottom: 25px;
            z-index: 1;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1;
        }

        a {
            text-decoration: none;
            color: #4a00b0; 
            font-weight: 700;
            font-size: 14px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            display: block;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="bg-shapes"></div>

    <div class="glass-card">
        <p>мне постоянно сносят твинки в тг, поэтому вот вам все мои аккаунты в тг на данный момент</p>
        <div class="links-container">
            <a href="https://t.me/mrsasya_q" target="_blank">t.me/mrsasya_q</a>
            <a href="https://t.me/badlyqb" target="_blank">t.me/badlyqb</a>
        </div>
    </div>

</body>
</html>
