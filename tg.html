<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my telegram links</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(98, 0, 238, 0.05) 0%, transparent 20%),
                        radial-gradient(circle at 90% 80%, rgba(3, 218, 198, 0.08) 0%, transparent 25%);
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            background: rgba(98, 0, 238, 0.03);
            top: -50px;
            right: -50px;
            animation: float 20s infinite linear;
        }

        .bg-shapes::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(0, 0, 0, 0.02);
            bottom: -100px;
            left: -100px;
        }

        @keyframes float {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass-card {
            width: 240px;
            height: 360px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(17px);
            -webkit-backdrop-filter: blur(17px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 24px 12px rgba(255, 255, 255, 1.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.8),
                transparent
            );
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.8),
                transparent,
                rgba(255, 255, 255, 0.3)
            );
        }

        p {
            font-size: 14px;
            color: #444;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1;
        }

        a {
            text-decoration: none;
            color: #6200ee;
            font-weight: 500;
            font-size: 16px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
            transition: background 0.3s ease;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="bg-shapes"></div>

    <div class="glass-card">
        <p>мне постоянно сносят твинки в тг, поэтому вот вам все мои аккаунты в тг на данный момент</p>
        <div class="links-container">
            <a href="https://t.me/mrsasya_q">@mrsasya_q</a>
            <a href="https://t.me/badlyqb">@badlyqb</a>
        </div>
    </div>

</body>
</html>
