<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contacts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f7fa;
            font-family: 'Roboto Flex', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(98, 0, 238, 0.08) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(3, 218, 198, 0.1) 0%, transparent 25%);
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.02);
            top: -50px;
            right: -50px;
        }

        .card {
            width: 240px;
            height: 360px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.02),
                0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
            justify-content: center;
            border: 1px solid #edf0f5;
        }

        p {
            font-size: 14px;
            font-weight: 400;
            color: #444;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        a {
            text-decoration: none;
            color: #6200ee; 
            font-weight: 600;
            font-size: 14px;
            padding: 14px;
            border-radius: 12px;
            background: #f8f9ff; 
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }

        a:hover {
            background: #6200ee;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(98, 0, 238, 0.2);
        }
    </style>
</head>
<body>

    <div class="bg-shapes"></div>

    <div class="card">
        <p>мне постоянно сносят твинки в тг, поэтому вот вам все мои аккаунты в тг на данный момент</p>
        <div class="links-container">
            <a href="https://t.me/mrsasya_q" target="_blank">t.me/mrsasya_q</a>
            <a href="https://t.me/badlyqb" target="_blank">t.me/badlyqb</a>
        </div>
    </div>

</body>
</html>
