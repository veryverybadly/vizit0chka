    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            overflow: hidden;
        }

        /* видео на заднем плане */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* растягивает видео без искажений пропорций */
        }

        ::selection {
            background: #9000ff;
            color: #fff;
        }

        .glass-card {
            width: 320px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.07); /* чуть уменьшил прозрачность для лучшего вида видео */
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 26px 13px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.6), transparent, rgba(255, 255, 255, 0.2));
        }

        header {
            margin-bottom: 25px;
        }

        .nickname {
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #9000ff;
            font-weight: 700;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            width: fit-content;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #9000ff;
            text-shadow: 0 0 10px rgba(144, 0, 255, 0.5);
            transform: translateX(5px);
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.png');
            opacity: 0.04;
            pointer-events: none;
            z-index: 5; /* шум теперь поверх видео, но под карточкой */
        }
    </style>
</head>
<body>

    <div class="video-background">
