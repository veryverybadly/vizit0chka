<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #bcbcbc;
            font-family: 'Spectral', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 300px;
            text-align: left;
            padding: 20px;
        }

        .logo {
            width: 40px;
            height: 40px;
            margin-bottom: 20px;
            filter: grayscale(1) brightness(1.5);
            opacity: 0.8;
        }

        header {
            margin-bottom: 30px;
        }

        .nickname {
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            color: #fff;
            font-weight: 700;
            font-style: italic;
            text-transform: lowercase;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        a {
            text-decoration: none;
            color: #666;
            font-size: 0.95rem;
            transition: color 0.2s ease;
            width: fit-content;
        }

        a:hover {
            color: #fff;
        }

        .divider {
            height: 1px;
            width: 20px;
            background: #333;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/twitter/twemoji/gh-pages/svg/1f637.svg" alt="logo" class="logo">
        
        <header>
            <div class="nickname">@veryverybadly</div>
        </header>

        <nav>
            <a href="/tg" target="_blank">tg</a>
            <a href="mailto:badlya_bad@xyecoc.com">email</a>
            <a href="https://goo.su/Sb7F2uw" target="_blank">github</a>
            <div class="divider"></div>
            <a href="ymcd">ymcd</a>
            <a href="https://veryverybadly.github.io/baadly-site/" target="_blank">baadly-site</a>
            <a href="https://luckyworldweb.neocities.org/" target="_blank">neocities</a>
        </nav>
    </div>

</body>
</html>
