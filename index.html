        body.dark .theme-toggle {

        body.light .theme-toggle:hover {

        @media (max-width: 500px) {

        body::before {
            content: "";
            position: fixed;

        }

        body.light::before {
            background-image: radial-gradient(rgba(76, 120, 73, 0.12) 1px, transparent 1px);
        }
    </style>
</head>

<script>
    const audio = new Audio('/music/index.mp3');
    audio.loop = true;
    let isPlaying = false;
    
    const musicDiv = document.getElementById('musicControl');
    const iconSpan = document.getElementById('musicIcon');
    const textSpan = document.getElementById('musicText');
    
    function toggleMusic() {
        if (isPlaying) {
            audio.pause();
            iconSpan.textContent = 'music_note';
            textSpan.textContent = 'Play music';
        } else {
            audio.play().catch(e => {
                console.log('Audio play error:', e);
                textSpan.textContent = 'Tap again';
                setTimeout(() => {
                    if (!isPlaying) textSpan.textContent = 'Play music';
                }, 1000);
            });
            if (!audio.paused) {
                iconSpan.textContent = 'music_off';
                textSpan.textContent = 'Pause';
            } else {
                if (audio.paused) return;
            }
        }
        isPlaying = !isPlaying;
        if (!isPlaying && !audio.paused) {
            audio.pause();
            isPlaying = false;
            iconSpan.textContent = 'music_note';
            textSpan.textContent = 'Play music';
        }
    }
    
    musicDiv.addEventListener('click', toggleMusic);
    
    audio.addEventListener('pause', () => {
        if (isPlaying && audio.paused) {
            isPlaying = false;
            iconSpan.textContent = 'music_note';
            textSpan.textContent = 'Play music';
        }
    });
    audio.addEventListener('play', () => {
        if (!isPlaying) {
            isPlaying = true;
            iconSpan.textContent = 'music_off';
            textSpan.textContent = 'Pause';
        }
    });
    const themeBtn = document.getElementById('themeToggleBtn');
    const themeIcon = themeBtn.querySelector('.material-symbols-outlined');
    const themeLabel = document.getElementById('themeText');
    
    function setTheme(theme) {
        const body = document.body;
        if (theme === 'light') {
            body.classList.remove('dark');
            body.classList.add('light');
            themeIcon.textContent = 'light_mode';
            themeLabel.textContent = 'Light';
            localStorage.setItem('verybadly_theme', 'light');
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            themeIcon.textContent = 'dark_mode';
            themeLabel.textContent = 'Dark';
            localStorage.setItem('verybadly_theme', 'dark');
        }
    }
    
    const savedTheme = localStorage.getItem('verybadly_theme');
    if (savedTheme === 'light') {
        setTheme('light');
    } else {
        setTheme('dark');
    }
    
    themeBtn.addEventListener('click', () => {
        const isDark = document.body.classList.contains('dark');
        if (isDark) {
            setTheme('light');
        } else {
            setTheme('dark');
        }
    });

    const LASTFM_API_KEY = '2bddd57c8e78028ca84fcd9da6182f4e';

        if (!lastfmContainer) return;
        lastfmContainer.innerHTML = `
            <div class="lastfm-card">
                <span class="material-symbols-outlined lastfm-icon">graphic_eq</span>
                <div class="lastfm-info">
                    <div class="lastfm-status">LOADING...</div>
                    <div class="lastfm-track-name">получаю трек с Last.fm</div>
                    <div class="lastfm-artist">—</div>
                </div>
                <div class="lastfm-link" style="opacity:0.4">
                    <span class="material-symbols-outlined">open_in_new</span>
                </div>
            </div>
        `;
        
        try {
            const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`;
            const response = await fetch(url);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data && data.recenttracks && data.recenttracks.track && data.recenttracks.track.length > 0) {
                const track = data.recenttracks.track[0];
                const artistName = track.artist ? (track.artist['#text'] || track.artist) : 'Unknown Artist';
                const trackName = track.name || 'Untitled';
                const trackUrl = track.url || '#';
                const nowPlayingAttr = track['@attr'];
                const isNowPlaying = (nowPlayingAttr && nowPlayingAttr.nowplaying === 'true');
                let statusText = isNowPlaying ? 'СЕЙЧАС ИГРАЕТ ♫' : 'ПОСЛЕДНИЙ ПРОСЛУШАННЫЙ ТРЕК';

                lastfmContainer.innerHTML = `
                    <div class="lastfm-card">
                        <span class="material-symbols-outlined lastfm-icon">${statusIcon}</span>
                        <div class="lastfm-info">
                            <div class="lastfm-status">${statusText}</div>
                            <div class="lastfm-track-name">${escapeHtml(trackName)}</div>
                            <div class="lastfm-artist">${escapeHtml(artistName)}</div>
                        </div>
                        <a href="${trackUrl}" target="_blank" rel="noopener noreferrer" class="lastfm-link" title="Открыть на Last.fm">

                `;
            } else {
                throw new Error('No tracks found');
            }
        } catch (error) {
            console.warn('Last.fm API error:', error);
            lastfmContainer.innerHTML = `
                <div class="lastfm-card lastfm-error" style="justify-content:center; gap:8px;">
                    <span class="material-symbols-outlined" style="font-size:20px;">cloud_off</span>
                    <span>не удалось загрузить трек с Last.fm</span>
                </div>
            `;
        }
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    fetchLastFmTrack();
    setInterval(() => {
        fetchLastFmTrack();
    }, 35000);
    window.addEventListener('focus', () => {
        fetchLastFmTrack();
    });
</script>
