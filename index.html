*{

body{
    background:#0a0a0a;
    color:#fff;
    font-family:Inter,system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

.container{
    width:100%;
    max-width:520px;
}

.profile{
    text-align:center;
    margin-bottom:32px;
}

.avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    margin-bottom:16px;
}

.name{
    font-size:32px;
    font-weight:700;
    margin-bottom:6px;
}

.username{
    color:#888;
    margin-bottom:6px;
}

.location{
    color:#666;
    font-size:14px;
    margin-bottom:14px;
}

.bio{
    color:#bdbdbd;
    font-size:15px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.link{
    background:#141414;
    border:1px solid #222;
    border-radius:16px;
    padding:18px 20px;
    text-decoration:none;
    color:white;
    transition:.2s;
}

.link:hover{
    background:#1b1b1b;
    border-color:#333;
    transform:translateY(-2px);
}

.title{
    font-weight:600;
}

.subtitle{
    color:#888;
    font-size:13px;
    margin-top:3px;
}

.webring-wrapper {
    margin: 8px 0 4px;
}
#webring {
    background:#141414;
    border:1px solid #222;
    border-radius:16px;
    padding:12px 20px;
    transition: .2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
#webring:hover {
    background:#1b1b1b;
    border-color:#333;
}
#webring a {
    color: #ffffff;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    background: #1e1e1e;
    padding: 6px 14px;
    border-radius: 40px;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid #2c2c2c;
}
#webring a:hover {
    background: #2a2a2a;
    border-color: #4a4a4a;
    transform: translateY(-1px);
}
#webring span {
    color: #ccc;
    font-size: 13px;
}
.footer{
    text-align:center;
    color:#555;
    margin-top:24px;
    font-size:13px;
