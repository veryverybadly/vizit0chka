<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restricted | veryverybadly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        .vhs-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ddd;
            z-index: -1;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.png');
            opacity: 0.05;
            pointer-events: none;
        }

        .rating-box {
            background: #fff;
            border: 4px solid #000;
            display: flex;
            flex-direction: row;
            max-width: 600px;
            width: 100%;
            position: relative;
        }

        .rating-left {
            background: #000;
            color: #fff;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 4px solid #000;
        }

        .rating-left span {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
        }

        .rating-right {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .rating-header {
            border-bottom: 4px solid #000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rating-header h1 {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links-grid {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .links-grid a {
            text-decoration: none;
            color: #000;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid transparent;
            padding: 4px 0;
            transition: all 0.2s;
            cursor: pointer;
        }

        .links-grid a:hover {
            background: #000;
            color: #fff;
        }

        .rating-footer {
            border-top: 4px solid #000;
            padding: 10px 20px;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1.4;
        }

        .clown-btn {
            position: absolute;
            bottom: -40px;
            right: 0;
            cursor: pointer;
            font-size: 1.5rem;
            filter: grayscale(1);
        }
        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        canvas {
            border: 4px solid #fff;
            background: #000;
        }

        .close-btn {
            margin-top: 20px;
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
            border: 2px solid #fff;
            padding: 10px 20px;
        }
        #music-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .music-container {
            background: #111;
            border: 4px solid #fff;
            width: 90%;
            max-width: 700px;
            padding: 20px;
        }

        .music-header {
            border-bottom: 2px solid #fff;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .music-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .music-stats {
            font-size: 0.8rem;
            color: #aaa;
        }
        .search-container {
            width: 100%;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: #222;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 10px 35px 10px 10px;
            text-transform: uppercase;
            outline: none;
        }

        .search-input:focus {
            background: #000;
        }

        .search-input::placeholder {
            color: #666;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
        }

        .search-clear:hover {
            color: #ff4444;
        }

        .music-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 10px;
        }

        .music-list li {
            padding: 8px 5px;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .music-list li:hover {
            background: #fff;
            color: #000;
            padding-left: 15px;
        }

        .music-list li::after {
            content: "↗";
            position: absolute;
            right: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .music-list li:hover::after {
            opacity: 1;
        }

        .no-results {
            color: #666;
            text-align: center;
            padding: 20px;
            font-style: italic;
            text-transform: uppercase;
        }
        .music-list::-webkit-scrollbar {
            width: 5px;
        }
        .music-list::-webkit-scrollbar-track {
            background: #333;
        }
        .music-list::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .music-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .music-footer .close-btn {
            margin-top: 0;
        }

        .search-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 5px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="vhs-bg"></div>
    <div class="noise"></div>

    <div class="rating-box">
        <div class="rating-left">
            <span>A</span>
        </div>
        
        <div class="rating-right">
            <div class="rating-header">
                <h1>александр</h1>
                <span style="font-size: 0.7rem; font-weight: 900;">@VERYVERYBADLY</span>
            </div>
            
            <div class="links-grid">
                <a href="https://t.me/butt11x" target="_blank">telegram/butt11x</a>
                <a href="https://t.me/swrqswrq" target="_blank">telegram/swrqswrq</a>
                <a href="mailto:badlya_bad@xyecoc.com">email/badlya_bad</a>
                <a href="https://goo.su/Sb7F2uw" target="_blank">github/badly</a>
                <a href="ymcd.html">project/ymcd</a>
                <a href="https://veryverybadly.github.io/baadly-site/" target="_blank">oldsite/baadly</a>
                <a href="https://luckyworldweb.neocities.org/" target="_blank">neocities/lucky</a>
                <a onclick="toggleMusic()">main/music</a>
            </div>

            <div class="rating-footer">
                under 17 requires accompanying<br>parent or adult guardian
            </div>
        </div>

        <div class="clown-btn" onclick="toggleGame()">🤡</div>
    </div>
    <div id="game-overlay">
        <div id="score" style="font-size: 2rem; margin-bottom: 10px;">0</div>
        <canvas id="birdGame" width="320" height="400"></canvas>
        <div class="close-btn" onclick="toggleGame()">выход</div>
    </div>
    <div id="music-overlay">
        <div class="music-container">
            <div class="music-header">
                <div class="music-header-top">
                    <span>SOUNDCLOUD LIBRARY</span>
                    <span class="music-stats" id="track-count">71 трек</span>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="search-input" placeholder="🔍 бесконечный поиск..." autocomplete="off">
                    <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
                </div>
            </div>
            <ul class="music-list" id="track-list">
            </ul>
            <div class="music-footer">
                <span style="font-size: 0.7rem; color: #666;">🎵 бесконечный поиск по библиотеке</span>
                <div class="close-btn" onclick="toggleMusic()">закрыть</div>
            </div>
            <div class="search-info" id="search-status"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('birdGame');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        
        let bird = { x: 50, y: 200, v: 0, r: 8 };
        let pipes = [];
        let score = 0;
        let frame = 0;

        function toggleGame() {
            const overlay = document.getElementById('game-overlay');
            if (document.getElementById('music-overlay').style.display === 'flex') {
                toggleMusic();
            }
            gameRunning = !gameRunning;
            overlay.style.display = gameRunning ? 'flex' : 'none';
            if(gameRunning) {
                resetGame();
                render();
            }
        }

        function resetGame() {
            bird.y = 200; bird.v = 0;
            pipes = []; score = 0; frame = 0;
            document.getElementById('score').innerText = score;
        }

        function render() {
            if(!gameRunning) return;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            bird.v += 0.25;
            bird.y += bird.v;
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI*2);
            ctx.fill();

            if(frame % 90 === 0) {
                let h = Math.random() * 200 + 50;
                pipes.push({x: canvas.width, h: h, passed: false});
            }

            pipes.forEach((p, i) => {
                p.x -= 2;
                ctx.fillRect(p.x, 0, 40, p.h);
                ctx.fillRect(p.x, p.h + 100, 40, canvas.height);

                if(p.x < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                    document.getElementById('score').innerText = score;
                }

                if(bird.y < 0 || bird.y > canvas.height || 
                  (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 40 && 
                  (bird.y - bird.r < p.h || bird.y + bird.r > p.h + 100))) {
                    resetGame();
                }
            });

            pipes = pipes.filter(p => p.x > -40);
            frame++;
            requestAnimationFrame(render);
        }

        window.onkeydown = (e) => { 
            if(e.code === 'Space' && gameRunning) {
                e.preventDefault();
                bird.v = -5;
            } 
        };
        
        canvas.onclick = () => { 
            if(gameRunning) bird.v = -5; 
        };
        let allTracks = [];
        const tracks = [
            "silentdrzz - PIXY – Legacy",
            "madk1d - последним летом",
            "madk1d - Барыга",
            "Aarne - CHRISTIAN POELL",
            "VILLIAN - Случайно Наступил На Шприц",
            "FORTUNA 812 - Простужен",
            "madk1d - дырки в штанах",
            "#вечныйкод - PARIS +паранойя",
            "9mice - Anora",
            "kidswaga - Цензура",
            "tewiq - murder",
            "dope17 - hennessy +3umph",
            "Слава КПСС - Исаакий Флоу",
            "NEWLIGHTCHILD - RIDER",
            "AMIRICLUB - Показать им свет",
            "Экзотик - ватсапп",
            "unki - Репер ничо не может (feat. DooMee, MAYOT, Slatt Savage, luvdakash)",
            "GLORY O'VISION - Not for Me",
            "mumble - feel alive",
            "lightprey - мудаком",
            "королевский XVII - sv moscow",
            "uglystephan - Школа не нужна",
            "BOOKER - Пора завязывать",
            "xxxmanera - Mood Down Paper Up",
            "RLX - kmoe-wide eyes (feat. dltzk & juno)",
            "2hollis - trauma",
            "Джон Гарик - Престиж",
            "Москва - Владивосток (feat. Heronwater)",
            "madk1d - 8 миля",
            "[ caesfleur ] - It Was A Good Day (Ice Cube)",
            "otuka - never enough (2023)",
            "madk1d - MARTINE ROSE",
            "VVELVET - Ment Club // prod. by ICEAGE (speed up)",
            "mumble - perkoset",
            "kouru - на небесах",
            "Baby Melo - ГАББА БАНДА (feat. Lida)",
            "omelazz - молчи – kyNZai",
            "илюха реп - нержавейка",
            "Слава КПСС х BOOKER - Трюк на крыше небоскрёба",
            "PLUSIX - Разлука",
            "songleakerhiphop - DRAKE-TOOSIE SLIDE",
            "Джон Гарик - Сиять",
            "Baggo & Big Baby Tape — Got Realer",
            "GONE.Fludd - OVERHEAVEN",
            "OG Buda - Мода Летит Пиздец",
            "@ilymeedy - samp freestyle",
            "тгк:gdee13 - Интерпол",
            "boibin - 1920s Ken Carson (Jennifer's Body)",
            "tewiq - попал",
            "osamason - Pop",
            "BabyTron - Grab Yo Skates",
            "PLUSIX - аромат цветов (все площадки)",
            "формула - PROJECT F",
            "BOOKER - ДЖАНК",
            "фобия - JUST DAMN 2.0",
            "Lil Moysi - Headliner",
            "Слава КПСС - No, Thanks",
            "STICKYFLOW - Плохому танцору",
            "пазнякс - гавайская пицца",
            "BOOKER - Время колокольчиков",
            "STED.D - Ты Понял?",
            "Noize MC - Вселенная бесконечна?",
            "pyrokinesis - Я краснею при тебе как..."
        ];
        allTracks = tracks.map((track, index) => ({
            original: track,
            display: `${(index + 1).toString().padStart(2, '0')}. ${track}`,
            searchable: track.toLowerCase(),
            artist: track.split('-')[0]?.trim() || '',
            title: track.split('-')[1]?.trim() || track
        }));

        function toggleMusic() {
            const overlay = document.getElementById('music-overlay');
            
            if (document.getElementById('game-overlay').style.display === 'flex') {
                toggleGame();
            }
            
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('search-input').focus();
                }, 100);
                filterTracks('');
            }
        }
        function filterTracks(query) {
            const trackListElement = document.getElementById('track-list');
            const searchClear = document.getElementById('search-clear');
            const trackCountElement = document.getElementById('track-count');
            searchClear.style.display = query ? 'block' : 'none';
            let filteredTracks;
            if (!query) {
                filteredTracks = allTracks;
            } else {
                const searchTerms = query.toLowerCase().split(' ').filter(term => term);
                filteredTracks = allTracks.filter(track => {
                    return searchTerms.every(term => 
                        track.searchable.includes(term) ||
                        track.artist.toLowerCase().includes(term) ||
                        track.title.toLowerCase().includes(term)
                    );
                });
            }
            trackListElement.innerHTML = '';
            
            if (filteredTracks.length === 0) {
                const li = document.createElement('li');
                li.className = 'no-results';
                li.textContent = '🎵 ничего не найдено';
                li.onclick = null;
                trackListElement.appendChild(li);
            } else {
                filteredTracks.forEach(track => {
                    const li = document.createElement('li');
                    li.textContent = track.display;
                    li.onclick = () => {
                        const searchQuery = encodeURIComponent(track.original);
                        window.open(`https://www.google.com/search?q=${searchQuery}`, '_blank');
                    };
                    
                    trackListElement.appendChild(li);
                });
            }
            trackCountElement.textContent = `${filteredTracks.length} из ${allTracks.length} треков`;
            const statusElement = document.getElementById('search-status');
            if (query) {
                statusElement.textContent = `🔍 найдено: ${filteredTracks.length}`;
            } else {
                statusElement.textContent = '';
            }
        }
        function clearSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.value = '';
            filterTracks('');
            searchInput.focus();
        }
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', function(e) {
                filterTracks(e.target.value);
            });
            
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    clearSearch();
                }
            });
        });
        window.onload = function() {
            filterTracks('');
        };
    </script>
</body>
</html>
