```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Тест для Кости Треугольника</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:700px;
    max-width:95%;
    background:#202020;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 40px rgba(255,255,255,.08);
    animation:appear .8s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(30px) scale(.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

h1{
    text-align:center;
    margin-bottom:25px;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    50%{
        transform:translateY(-5px);
    }
}

.question{
    margin-bottom:20px;
    padding:15px;
    background:#2a2a2a;
    border-radius:12px;
    transition:.3s;
}

.question:hover{
    transform:scale(1.02);
}

label{
    display:block;
    margin-top:8px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4caf50;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.flash{
    position:fixed;
    inset:0;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:90px;
    font-weight:bold;
    z-index:9999;
    animation:flash .25s infinite;
}

@keyframes flash{
    0%{
        background:red;
        color:white;
    }
    50%{
        background:white;
        color:red;
    }
    100%{
        background:red;
        color:white;
    }
}

.result{
    display:none;
    text-align:center;
    animation:zoom .7s ease;
}

@keyframes zoom{
    from{
        transform:scale(.3) rotate(-10deg);
        opacity:0;
    }
    to{
        transform:scale(1) rotate(0);
        opacity:1;
    }
}

.iq{
    font-size:100px;
    color:red;
    animation:shake .3s infinite;
}

@keyframes shake{
    0%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    100%{transform:translateX(-5px);}
}

.skull{
    font-size:80px;
    animation:spin 2s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0);
    }
    to{
        transform:rotate(360deg);
    }
}

.small{
    color:#aaa;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container" id="test">

<h1>🧠 Официальный IQ-тест для Кости Треугольника</h1>

<div class="question">
<p>Сколько будет 2 + 2?</p>
<label><input type="radio"> 4</label>
<label><input type="radio"> 5</label>
</div>

<div class="question">
<p>Какого цвета небо?</p>
<label><input type="radio"> Синее</label>
<label><input type="radio"> Красное</label>
</div>

<div class="question">
<p>Сколько ног у человека?</p>
<label><input type="radio"> 2</label>
<label><input type="radio"> 17</label>
</div>

<div class="question">
<p>Продолжи ряд: 1 2 3 4 ...</p>
<label><input type="radio"> 5</label>
<label><input type="radio"> Картошка</label>
</div>

<button onclick="startCheck()">
🚀 Проверить IQ
</button>

</div>

<script>
function startCheck(){

const flash=document.createElement("div");
flash.className="flash";
flash.innerHTML="❌ НЕПРАВИЛЬНО ❌";

document.body.appendChild(flash);

let sounds = [
"Ошибка!",
"Неверно!",
"Провал!",
"Минус IQ!",
"Попробуйте стать умнее!"
];

let i=0;

let interval=setInterval(()=>{
flash.innerHTML="❌ " + sounds[i%sounds.length] + " ❌";
i++;
},250);

setTimeout(()=>{

clearInterval(interval);

document.body.innerHTML=`
<div class="container result" style="display:block">

<div class="skull">💀</div>

<h1>Результаты проверки</h1>

<p>Вопрос 1 — ❌</p>
<p>Вопрос 2 — ❌</p>
<p>Вопрос 3 — ❌</p>
<p>Вопрос 4 — ❌</p>

<br>

<h2>Итоговый IQ:</h2>

<div class="iq">0</div>

<h2>Поздравляем!</h2>

<p>
Костя треугольник удали весь свой блоат софт командой /kickme
</p>

<p>
Он реально тупой ✅✅✅
</p>

<p class="small">
бляяя я хз че тут написать
</p>

</div>
`;

},5000);
}
</script>

</body>
</html>
```
