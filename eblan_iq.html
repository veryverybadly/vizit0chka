```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Тест для Кости Треугольника</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    padding: 30px;
}

.container {
    background: #222;
    padding: 25px;
    border-radius: 15px;
    width: 600px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

h1 {
    text-align: center;
}

.question {
    margin: 20px 0;
}

button {
    background: #4caf50;
    border: none;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    width: 100%;
}

button:hover {
    background: #45a049;
}

.result {
    text-align: center;
    font-size: 24px;
    margin-top: 20px;
    display: none;
}

label {
    display: block;
    margin: 5px 0;
}
</style>
</head>
<body>

<div class="container">
    <h1>🧠 IQ Тест для Кости Треугольника</h1>

    <div class="question">
        <p>1. Сколько будет 2 + 2?</p>
        <label><input type="radio" name="q1"> 4</label>
        <label><input type="radio" name="q1"> 5</label>
        <label><input type="radio" name="q1"> 22</label>
    </div>

    <div class="question">
        <p>2. Какого цвета небо?</p>
        <label><input type="radio" name="q2"> Синее</label>
        <label><input type="radio" name="q2"> Зелёное</label>
        <label><input type="radio" name="q2"> Кирпичное</label>
    </div>

    <div class="question">
        <p>3. Сколько ног у человека?</p>
        <label><input type="radio" name="q3"> 2</label>
        <label><input type="radio" name="q3"> 7</label>
        <label><input type="radio" name="q3"> 48</label>
    </div>

    <div class="question">
        <p>4. Продолжи ряд: 1, 2, 3, 4...</p>
        <label><input type="radio" name="q4"> 5</label>
        <label><input type="radio" name="q4"> Банан</label>
        <label><input type="radio" name="q4"> 999</label>
    </div>

    <div class="question">
        <p>5. Ты уверен в своих ответах?</p>
        <label><input type="radio" name="q5"> Да</label>
        <label><input type="radio" name="q5"> Конечно</label>
        <label><input type="radio" name="q5"> Абсолютно</label>
    </div>

    <button onclick="finishTest()">Узнать IQ</button>

    <div id="result" class="result"></div>
</div>

<script>
function finishTest() {
    const result = document.getElementById("result");

    result.style.display = "block";
    result.innerHTML = `
        <h2>Проверка ответов...</h2>
        <p>❌ Вопрос 1 — неправильно</p>
        <p>❌ Вопрос 2 — неправильно</p>
        <p>❌ Вопрос 3 — неправильно</p>
        <p>❌ Вопрос 4 — неправильно</p>
        <p>❌ Вопрос 5 — неправильно</p>
        <hr>
        <h1>Ваш IQ: 0</h1>
        <p>Поздравляем! Вы установили мировой антирекорд.</p>
        <p>🧱 Костя Треугольник официально признан гением наоборот.</p>
    `;
}
</script>

</body>
</html>
```
