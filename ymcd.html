<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ymcd - artwork and music</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Roboto, Arial, sans-serif;
    }

    body {
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .card {
        background: #fff;
        width: 100%;
        max-width: 520px;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 8px 24px rgba(0,0,0,.12);
        text-align: center;
    }

    .title {
        font-size: 28px;
        font-weight: 500;
        color: #212121;
        margin-bottom: 20px;
    }

    .text {
        font-size: 18px;
        color: #616161;
        line-height: 1.6;
    }

    .divider {
        height: 1px;
        background: #e0e0e0;
        margin: 28px 0 20px;
    }

    .footer {
        color: #9e9e9e;
        font-size: 14px;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="title">YMCD</div>

    <div class="text">
        ymcd изжил своё,<br>
        в ближайшем будущем планируется передел
    </div>

    <div class="divider"></div>

    <div class="footer">
        2025–2026
    </div>
</div>

</body>
</html>
