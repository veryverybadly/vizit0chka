<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>земля стекловатой</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    background:#111;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
        radial-gradient(circle at 50% 30%, #3a3a3a, #111);
    font-family:Arial,sans-serif;
    margin:0;
}

.scene{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.grave{
    width:280px;
    height:360px;
    background:linear-gradient(180deg,#8d8d8d,#686868);
    border-radius:140px 140px 18px 18px;
    border:4px solid #505050;
    box-shadow:
        inset 0 2px 15px rgba(255,255,255,.15),
        0 15px 40px rgba(0,0,0,.45);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#111;
    z-index:2;
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.text{
    font-size:34px;
    font-weight:bold;
}

.date{
    margin-top:15px;
    font-size:22px;
    opacity:.8;
}

.ground{
    width:420px;
    height:90px;
    background:#203320;
    border-radius:50%;
    margin-top:-20px;
    z-index:1;
    box-shadow:0 0 40px rgba(0,0,0,.4);
}

.fog{
    position:absolute;
    width:700px;
    height:120px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
    filter:blur(30px);
    top:250px;
    animation:fog 8s ease-in-out infinite alternate;
}

@keyframes fog{
    from{
        transform:translateX(-20px);
    }
    to{
        transform:translateX(20px);
    }
}
</style>
</head>
<body>

<div class="scene">
    <div class="fog"></div>

    <div class="grave">
        <div class="title">YMCD</div>
        <div class="text">сдох</div>
        <div class="date">2025–2026</div>
    </div>

    <div class="ground"></div>
</div>

</body>
</html>
