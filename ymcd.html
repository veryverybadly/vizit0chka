<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>земля стекловатой</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(#2b2b2b 0%, #1c1c1c 60%, #0f0f0f 100%);
    font-family:Arial,sans-serif;
}

.grave::after{
    content:"";
    position:absolute;
    bottom:-35px;
    left:50%;
    transform:translateX(-50%);
    width:420px;
    height:80px;
    background:#1d3b1d;
    border-radius:50%;
}

.grave::before{
    content:"✝";
    position:absolute;
    top:25px;
    font-size:48px;
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-top:30px;
    text-transform:uppercase;
}

.text{
    font-size:28px;
    margin-top:10px;
}

.date{
    font-size:20px;
    margin-top:15px;
    opacity:.8;
}

.ground{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:120px;
    background:#1d3b1d;
}

.fog{
    position:absolute;
    width:200%;
    height:200px;
    bottom:70px;
    left:-50%;
    background:rgba(255,255,255,.04);
    filter:blur(20px);
    animation:fog 12s linear infinite;
}

@keyframes fog{
    from{transform:translateX(-10%);}
    to{transform:translateX(10%);}
}
</style>
</head>
<body>

<div class="fog"></div>

<div class="grave">
    <div class="title">YMCD</div>
    <div class="text">сдох</div>
    <div class="date">2025–2026</div>
</div>

<div class="ground"></div>

</body>
</html>
