<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexander ✦ Психоделический сайт</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:Inter,system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    /* Базовые стили — поверх них наложатся анимации из JavaScript */
    transition: filter 0.3s ease;
}

.container{
    width:100%;
    max-width:520px;
    position: relative;
    z-index: 2;
}

.profile{
    text-align:center;
    margin-bottom:32px;
}

.avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    margin-bottom:16px;
    display: inline-block;
    transition: all 0.2s ease;
}

.name{
    font-size:32px;
    font-weight:700;
    margin-bottom:6px;
}

.username{
    color:#888;
    margin-bottom:6px;
}

.location{
    color:#666;
    font-size:14px;
    margin-bottom:14px;
}

.bio{
    color:#bdbdbd;
    font-size:15px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.link{
    background:#141414;
    border:1px solid #222;
    border-radius:16px;
    padding:18px 20px;
    text-decoration:none;
    color:white;
    transition:.2s;
    display: block;
}

.link:hover{
    background:#1b1b1b;
    border-color:#333;
    transform:translateY(-2px);
}

.title{
    font-weight:600;
}

.subtitle{
    color:#888;
    font-size:13px;
    margin-top:3px;
}

/* Стили для веб-ринга */
.webring-wrapper {
    margin-top: 30px;
    background: #141414;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 20px;
}

.CTW-intro {
    margin-bottom: 12px;
    text-align: center;
    font-size: 14px;
    color: #aaa;
}

.CTW-intro a {
    color: #fff;
    text-decoration: none;
}

.CTW-intro a:hover {
    text-decoration: underline;
}

.CTW-nav ul {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 0;
    margin: 0;
}

.CTW-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1f1f1f;
    padding: 8px 16px;
    border-radius: 20px;
}

.CTW-link a {
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.CTW-link a:hover {
    text-decoration: underline;
}

.CTW-link-direction {
    font-weight: bold;
    font-size: 14px;
}

.footer{
    text-align:center;
    color:#555;
    margin-top:24px;
    font-size:13px;
}

/* Дополнительная защита для текста — чтобы не было слишком нечитаемо */
body * {
    transition: all 0.2s ease-out;
}
</style>
</head>
<body>

<div class="container">

    <div class="profile">
        <img
            class="avatar"
            src="https://raw.githubusercontent.com/twitter/twemoji/gh-pages/svg/1f637.svg"
            alt="avatar">

        <div class="name">Александр</div>
        <div class="username">@veryverybadly (aka @swar_q)</div>
        <div class="location">📍 Moscow</div>
        <div class="bio">эээ... ну... я крутой... ✦ ПСИХОДЕЛИЯ ✦</div>
    </div>

    <div class="links">

        <a class="link" href="https://t.me/swar_q">
            <div class="title">Telegram</div>
            <div class="subtitle">Основной аккаунт</div>
        </a>

        <a class="link" href="https://t.me/x7x7x7x7x7x7x7x7x7x7_bot">
            <div class="title">Telegram Bot</div>
            <div class="subtitle">Смешинковый бот</div>
        </a>

        <a class="link" href="mailto:badlya_bad@xyecoc.com">
            <div class="title">Email</div>
            <div class="subtitle">Связаться по почте</div>
        </a>

        <a class="link" href="https://github.com/veryverybadly">
            <div class="title">GitHub</div>
            <div class="subtitle">Мои проекты</div>
        </a>

        <a class="link" href="ymcd">
            <div class="title">YMCD</div>
            <div class="subtitle">Проект</div>
        </a>

        <a class="link" href="https://veryverybadly.github.io/baadly-site/">
            <div class="title">Old Site</div>
            <div class="subtitle">Старая версия сайта</div>
        </a>

        <a class="link" href="/ip">
            <div class="title">WATCH UR FCKNG IP</div>
            <div class="subtitle">👁️</div>
        </a>

    </div>

    <!-- Веб-ринг -->
    <div class="webring-wrapper">
        <div id="ctwebring"></div>
    </div>

    <div class="footer">
        veryverybadly ✦ Психоделическая версия
    </div>

</div>

<script>
// ======================= ВНЕДРЕНИЕ ПСИХОДЕЛИЧЕСКИХ ЭФФЕКТОВ =======================

// 1. Внедряем CSS-стили для психоделических анимаций
const styleElem = document.createElement('style');
styleElem.innerHTML = `
  /* Бесконечный перелив фонового градиента */
  body {
    animation: psychoBg 10s ease infinite alternate !important;
    background-size: 400% 400% !important;
    transition: filter 0.3s ease;
  }

  /* Постоянное покачивание и деформация картинок и блоков */
  img, div, p, h1, h2, button, .link, .name, .username, .bio, .avatar, .container {
    animation: acidTrip 6s ease-in-out infinite alternate;
    will-change: transform, filter;
  }

  /* Разделяем анимации по времени, чтобы всё двигалось хаотично */
  div:nth-child(even) { animation-duration: 4s; animation-delay: 1s; }
  p:nth-child(3n) { animation-duration: 8s; }
  img { animation-duration: 5s; filter: hue-rotate(0deg); }
  .link { animation-duration: 3.5s; animation-delay: 0.5s; }
  .avatar { animation-duration: 4.2s; }
  .name { animation-duration: 5.5s; animation-delay: 0.3s; }
  .bio { animation-duration: 7s; }

  /* Анимация изменения цвета фона */
  @keyframes psychoBg {
    0% { background: #ff0055; }
    25% { background: #00ffaa; }
    50% { background: #0022ff; }
    75% { background: #ffee00; }
    100% { background: #ff00ff; }
  }

  /* Анимация "плывущего" пространства */
  @keyframes acidTrip {
    0% {
      transform: scale(1) rotate(0deg) skewX(0deg);
      filter: hue-rotate(0deg) contrast(100%);
    }
    50% {
      transform: scale(1.03) rotate(2deg) skewX(3deg);
      filter: hue-rotate(180deg) contrast(150%) blur(0.5px);
    }
    100% {
      transform: scale(0.97) rotate(-2deg) skewX(-3deg);
      filter: hue-rotate(360deg) contrast(200%);
    }
  }

  /* Стиль для кастомного шлейфа за курсором */
  .psycho-blob {
    position: fixed;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(0,0,0,0) 70%);
    mix-blend-mode: color-dodge;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s linear;
  }

  /* Усиление эффекта для ссылок при наведении */
  .link:hover {
    animation: acidTrip 0.5s ease infinite !important;
    filter: brightness(1.2);
    transform: scale(1.02) !important;
  }

  /* Дополнительное свечение для веб-ринга */
  .webring-wrapper {
    animation: acidTrip 6s ease-in-out infinite alternate;
    animation-duration: 4s;
  }
`;
document.head.appendChild(styleElem);

// 2. JS Эффект: Цветовой взрыв при клике в любой точке сайта
document.addEventListener('click', (e) => {
    // Создаем круговую волну искажения цвета
    const flash = document.createElement('div');
    const randomHue = Math.random() * 360;
    flash.style.position = 'fixed';
    flash.style.left = e.clientX + 'px';
    flash.style.top = e.clientY + 'px';
    flash.style.width = '10px';
    flash.style.height = '10px';
    flash.style.backgroundColor = `hsl(${randomHue}, 100%, 50%)`;
    flash.style.borderRadius = '50%';
    flash.style.pointerEvents = 'none';
    flash.style.zIndex = '99998';
    flash.style.transition = 'all 0.8s ease-out';
    flash.style.transform = 'translate(-50%, -50%)';
    
    document.body.appendChild(flash);
    
    // Мгновенно расширяем и растворяем волну, а также инвертируем весь сайт на долю секунды
    setTimeout(() => {
        flash.style.width = '2000px';
        flash.style.height = '2000px';
        flash.style.opacity = '0';
        document.body.style.filter = 'invert(1) saturate(5)';
        // Дополнительный эффект: меняем насыщенность всех цветов
        const allElements = document.querySelectorAll('.link, .name, .username');
        allElements.forEach(el => {
            el.style.filter = 'hue-rotate(' + Math.random() * 360 + 'deg)';
        });
    }, 10);

    setTimeout(() => {
        flash.remove();
        document.body.style.filter = 'none';
        // Возвращаем фильтры элементов в норму (анимация сама всё восстановит)
        const allElements = document.querySelectorAll('.link, .name, .username');
        allElements.forEach(el => {
            el.style.filter = '';
        });
    }, 800);
});

// 3. JS Эффект: Тягучий "жидкий" след за курсором мыши
const blob = document.createElement('div');
blob.className = 'psycho-blob';
document.body.appendChild(blob);

document.addEventListener('mousemove', (e) => {
    // Меняем цвет шлейфа на лету в зависимости от координат мыши
    const hue = (e.clientX / window.innerWidth) * 360;
    blob.style.background = `radial-gradient(circle, hsl(${hue}, 100%, 60%) 0%, rgba(0,0,0,0) 70%)`;
    // Добавляем небольшое изменение размера в зависимости от Y координаты
    const size = 60 + (e.clientY / window.innerHeight) * 60;
    blob.style.width = size + 'px';
    blob.style.height = size + 'px';
    
    blob.style.left = e.clientX + 'px';
    blob.style.top = e.clientY + 'px';
});

// 4. Scroll эффект — хаотичное движение элементов при скролле
let scrollTimeout;
window.addEventListener('scroll', () => {
    const elements = document.querySelectorAll('p, h1, h2, button, img, .link, .avatar');
    elements.forEach(el => {
        const randomX = (Math.random() - 0.5) * 20;
        const randomRotate = (Math.random() - 0.5) * 15;
        el.style.transform = `translateX(${randomX}px) scale(1.05) rotate(${randomRotate}deg)`;
        el.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
    });
    
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        const elements = document.querySelectorAll('p, h1, h2, button, img, .link, .avatar');
        elements.forEach(el => {
            el.style.transform = '';
            el.style.filter = '';
        });
    }, 200);
});

// 5. Дополнительный эффект: плавающие разноцветные частицы при движении мышью (для большего безумия)
const particleContainer = document.createElement('div');
particleContainer.style.position = 'fixed';
particleContainer.style.top = '0';
particleContainer.style.left = '0';
particleContainer.style.width = '100%';
particleContainer.style.height = '100%';
particleContainer.style.pointerEvents = 'none';
particleContainer.style.zIndex = '99997';
document.body.appendChild(particleContainer);

let lastX = 0, lastY = 0;
document.addEventListener('mousemove', (e) => {
    // Создаём частицы при движении, если мышь двигается быстро
    const dx = Math.abs(e.clientX - lastX);
    const dy = Math.abs(e.clientY - lastY);
    if (dx > 5 || dy > 5) {
        const particle = document.createElement('div');
        const size = 5 + Math.random() * 12;
        const hue = Math.random() * 360;
        particle.style.position = 'absolute';
        particle.style.left = e.clientX + 'px';
        particle.style.top = e.clientY + 'px';
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.backgroundColor = `hsl(${hue}, 100%, 60%)`;
        particle.style.borderRadius = '50%';
        particle.style.pointerEvents = 'none';
        particle.style.opacity = '0.8';
        particle.style.transition = 'all 1.5s ease-out';
        particle.style.boxShadow = `0 0 8px hsl(${hue}, 100%, 70%)`;
        particleContainer.appendChild(particle);
        
        // Анимация угасания и движения
        setTimeout(() => {
            particle.style.transform = `translate(${(Math.random() - 0.5) * 100}px, ${(Math.random() - 0.5) * 100}px)`;
            particle.style.opacity = '0';
        }, 10);
        
        setTimeout(() => {
            particle.remove();
        }, 1500);
    }
    lastX = e.clientX;
    lastY = e.clientY;
});

// 6. Эффект "размытия" при двойном клике (дополнительный угар)
document.addEventListener('dblclick', () => {
    document.body.style.filter = 'blur(8px) brightness(1.5)';
    setTimeout(() => {
        document.body.style.filter = '';
    }, 500);
});

// 7. Случайная смена цветов текста и фона у блоков через каждые 3 секунды (хаотично)
setInterval(() => {
    const randomBlocks = document.querySelectorAll('.link, .profile, .webring-wrapper');
    randomBlocks.forEach(block => {
        if (Math.random() > 0.7) {
            const randomColor = `hsl(${Math.random() * 360}, 70%, 55%)`;
            block.style.backgroundColor = randomColor;
            block.style.borderColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
            setTimeout(() => {
                if (block.classList.contains('link')) {
                    block.style.backgroundColor = '';
                    block.style.borderColor = '';
                } else {
                    block.style.backgroundColor = '';
                    block.style.borderColor = '';
                }
            }, 800);
        }
    });
}, 3000);

// 8. Вибрация заголовка при наведении (дополнительная анимация)
const nameElement = document.querySelector('.name');
if (nameElement) {
    nameElement.addEventListener('mouseenter', () => {
        nameElement.style.animation = 'acidTrip 0.2s infinite';
        setTimeout(() => {
            nameElement.style.animation = '';
        }, 800);
    });
}

// ======================= ВЕБ-РИНГ (оригинальная логика, без изменений) =======================
function showWebring(useStyles) {
  let elm = 'ctwebring';

  const url = 'https://veryverybadly.github.io/webring-starter/list.json';

  let req = new XMLHttpRequest();
  req.open('GET', url, true);
  req.responseType = 'json';

  req.onload = function() {
    if(req.status != 200) {
      console.error('Webring: Unable to load', url);
      return;
    }

    if(!req.response) {
      console.error('Webring: No response returned', url);
    }

    doShow(req.response, elm);
  }

  function doShow(response, elm) {
    let sites = response.sites;

    let current;
    for(let i = 0; i < sites.length; i++) {
      if(window.location.href.substr(0, sites[i].url.length) === sites[i].url) {
        current = i;
        break;
      }
    }

    if(typeof current === 'undefined') {
      current = 0;
    }

    let next = sites[((current + 1) % sites.length)];
    let prev = sites[((current + sites.length - 1) % sites.length)];

    document.getElementById(elm).innerHTML = `<div class="CTW-container">
      <div class="CTW-intro">
        This website is part of the <strong><a href="https://veryverybadly.github.io/webring-starter/">halal webring</a></strong>.
      </div>

      <nav class="CTW-nav"><ul>
        <li class="CTW-link CTW-link-prev">
          <span class="CTW-link-direction">&larr;</span>
          <a href="${prev.url}" class="CTW-link-name">${prev.name}</a>
        </li>
        <li class="CTW-link CTW-link-next">
          <a href="${next.url}" class="CTW-link-name">${next.name}</a>
          <span class="CTW-link-direction">&rarr;</span>
        </li>
      </ul></nav>
    </div>`;

    if(useStyles) {
      let style = document.createElement('style');
      style.appendChild(document.createTextNode(`
        .CTW-intro {
          margin-bottom: 1rem;
        }
        .CTW-nav {
          list-style: none;
          display: flex;
        }
        .CTW-link {
          display: inline-block;
        }
        .CTW-link:not(:last-child) {
          margin-right: 2rem;
        }
      `));
      document.getElementById(elm).appendChild(style);
    }
  }

  req.send();
}

showWebring(true);
</script>

</body>
