<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЦ Гача Кликер v1.3</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            
            /* Настройки фонового изображения */
            background-image: url('https://badly.s-ul.eu/cvHriZEo.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Полупрозрачный слой поверх фона */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(240, 242, 245, 0.75);
            z-index: -1;
        }

        /* Верхняя панель с кнопками управления */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .changelog-trigger {
            background: #747d8c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            z-index: 2;
        }
        .changelog-trigger:hover { background: #57606f; }

        .reset-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            z-index: 2;
        }
        .reset-btn:hover { background: #ff2e44; }

        .game-layout {
            display: flex;
            gap: 25px;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 2;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        .main-panel {
            flex: 1.2;
            min-width: 320px;
            text-align: center;
        }

        .shop-panel {
            flex: 0.8;
            min-width: 300px;
        }

        h1, h2, h3 {
            color: #333;
            margin-top: 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 18px;
            color: #444;
            border-left: 5px solid #ff4757;
        }

        .stat-box strong {
            color: #ff4757;
        }

        .click-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.05s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            margin-bottom: 20px;
            user-select: none; /* Предотвращает выделение текста кнопки при быстром тапе */
        }

        .click-btn:hover { background-color: #ff6b81; }
        .click-btn:active { transform: scale(0.96); }

        .box-container {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease-out;
            border-top: 2px dashed #ddd;
            padding-top: 20px;
        }

        .secret-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .shop-info {
            text-align: left;
        }

        .shop-info div {
            font-weight: bold;
            font-size: 15px;
        }

        .shop-info span {
            font-size: 12px;
            color: #777;
        }

        .buy-btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .buy-btn:hover { background: #26af5f; }
        .buy-btn:disabled {
            background: #ced6e0;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            font-size: 20px; cursor: pointer; color: #aaa;
        }

        .close-modal:hover { color: #333; }

            text-align: left
