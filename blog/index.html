    <title>Главная</title>
    <style>
        body {
            background-color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #ffffff;
        }

        .nav {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            opacity: 0.7;
        }

        .nav a:hover {
            opacity: 1;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            font-weight: normal;
            margin-bottom: 16px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="helloworld.html">Статья</a>
    </div>

    <div class="center">

            <p>привет как дела ✅</p>

</html>
