<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUGOPAC | Neural Universal Global Operations Platform Analytics Cloud</title>
    <link href="https://fonts.cdnfonts.com/css/pixeloid-sans" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #33ff33; /* Яркий матричный зеленый */
            --accent-color: #ffffff;
        }

        /* Настройки курсора для всей страницы */
        html, body {
            /* Перекрестие (crosshair) встроенное в браузер */
            cursor: crosshair; 
            
            /* Вариант, если хочется более тонкое CSS-перекрестие (если браузер поддерживает) */
            /* cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" style="fill:none;stroke:white;stroke-width:1;"><line x1="8" y1="0" x2="8" y2="16"/><line x1="0" y1="8" x2="16" y2="8"/></svg>') 8 8, auto; */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pixeloid Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            border: 1px solid rgba(51, 255, 51, 0.3);
            padding: 50px;
            max-width: 90%;
            background: rgba(0, 0, 0, 0.5);
            /* Легкое свечение */
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.1);
            position: relative;
        }

        /* Уголки для контейнера (декор) */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-color);
        }

        /* Верхний левый */
        .container::before {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        /* Нижний правый */
        .container::after {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 25px 0;
            letter-spacing: 15px;
            color: var(--accent-color);
            text-shadow: 0 0 5px var(--text-color);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.4;
            letter-spacing: 3px;
            margin: 0;
            opacity: 0.9;
        }

        /* Терминальный мигающий блок */
        .terminal-cursor {
            display: inline-block;
            width: 12px;
            height: 22px;
            background-color: var(--text-color);
            animation: blink 1s steps(2) infinite;
            vertical-align: middle;
            margin-left: 10px;
            box-shadow: 0 0 5px var(--text-color);
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; letter-spacing: 5px; }
            p { font-size: 0.9rem; letter-spacing: 1px; }
            .container { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NUGOPAC</h1>
        <p>
            Neural Universal Global Operations Platform Analytics Cloud
            <span class="terminal-cursor"></span>
        </p>
    </div>

</body>
</html>
